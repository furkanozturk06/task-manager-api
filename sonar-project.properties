# Task Manager — SonarQube konfigürasyonu
# Tüm analiz aşamaları aynı dosya ile taranır.

sonar.projectKey=task-manager
sonar.projectName=Task Manager
sonar.projectVersion=1.0.0

# Yalnızca projenin kendi kodu analize dahil
sonar.sources=src,client/src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts,tests/**/*.test.tsx

# node_modules, dist, build ve raporlar hariç
sonar.exclusions=**/node_modules/**,**/node_modules_old/**,**/dist/**,**/build/**,**/coverage/**,reports/**,data/**,client/dist/**
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,tests/**

sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPaths=tsconfig.json,client/tsconfig.json

# ESLint JSON raporunu Sonar'a taşımak için (opsiyonel, bilgi amaçlı)
# sonar.eslint.reportPaths=reports/stage1/eslint.json

# --- Suppression #1 -----------------------------------------------------------
# typescript:S6847 ("Non-interactive elements should not be assigned mouse or
# keyboard event listeners") — Native HTML5 drag-and-drop API requires
# onDragStart on the source element (task card <article>) and onDragOver/onDrop
# on the drop target (kanban column <section>). These are not click/keyboard
# interactions: they are mandatory DnD lifecycle events the browser fires
# regardless of role. Konvert etmenin alternatifi (her şeyi <button> içine almak)
# nested-button HTML kuralını ihlal eder ve kanban tahtasının drag-drop UX'ini
# bozar. Risk değerlendirmesi: a11y açısından sıfır — etkileşim ek olarak
# stretched-link <button>'lar üzerinden klavye ile zaten erişilebilir.
sonar.issue.ignore.multicriteria=s6847dnd
sonar.issue.ignore.multicriteria.s6847dnd.ruleKey=typescript:S6847
sonar.issue.ignore.multicriteria.s6847dnd.resourceKey=client/src/pages/TasksPage.tsx

# Host ve kimlik bilgileri CLI üzerinden geçilir:
#   sonar-scanner -Dsonar.host.url=http://localhost:9000 -Dsonar.token=...
